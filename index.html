<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendataan Pelanggaran Ambalan Pramuka</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeInUp 0.8s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .members-list {
            margin-top: 20px;
        }

        .member-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
            animation: slideIn 0.5s ease;
            transition: all 0.3s ease;
            position: relative;
        }

        .member-item.warning {
            background: linear-gradient(135deg, #ffe5e5 0%, #ffc9c9 100%);
            border-left: 5px solid #ff6b6b;
        }

        .member-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .member-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
        }

        .class-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 5px;
        }

        .violation-count {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .count-badge {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1em;
        }

        .count-badge.warning {
            background: #ff6b6b;
            animation: pulse 2s infinite;
        }

        .warning-icon {
            font-size: 1.5em;
            animation: shake 0.5s ease;
        }

        .violation-details {
            background: rgba(255, 255, 255, 0.5);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .violation-entry {
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .violation-entry:last-child {
            border-bottom: none;
        }

        .violation-date {
            color: #666;
            font-size: 0.9em;
            font-weight: 600;
        }

        .violation-desc {
            margin-top: 5px;
            color: #555;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-small {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-add {
            background: #10b981;
            color: white;
            flex: 1;
        }

        .btn-add:hover {
            background: #059669;
            transform: scale(1.05);
        }

        .btn-delete {
            background: #ef4444;
            color: white;
        }

        .btn-delete:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        .warning-section {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
            animation: pulse 2s infinite;
        }

        .warning-section h3 {
            margin-bottom: 15px;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .warning-list {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
        }

        .warning-item {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .warning-item:last-child {
            margin-bottom: 0;
        }

        .warning-name {
            font-weight: 700;
            font-size: 1.1em;
        }

        .warning-class {
            font-size: 0.9em;
            color: #666;
        }

        .warning-count-badge {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1em;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .toggle-btn {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .toggle-btn:hover {
            background: #5568d3;
        }

        .violation-details.hidden {
            display: none;
        }

        .member-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .member-card:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.2);
        }

        .member-info {
            flex: 1;
        }

        .member-info-name {
            font-weight: 700;
            font-size: 1.1em;
            color: #333;
        }

        .member-info-class {
            color: #666;
            font-size: 0.9em;
            margin-top: 3px;
        }

        .btn-edit {
            background: #3b82f6;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        #memberForm {
            margin-bottom: 20px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 10px;
        }

        .member-dropdown {
            position: absolute;
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            width: calc(100% - 24px);
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
        }

        .member-dropdown.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #f0f0f0;
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: #f5f7fa;
        }

        .dropdown-item.selected {
            background: #667eea;
            color: white;
        }

        .dropdown-name {
            font-weight: 600;
            color: #333;
        }

        .dropdown-item:hover .dropdown-name,
        .dropdown-item.selected .dropdown-name {
            color: inherit;
        }

        .dropdown-class {
            font-size: 0.85em;
            color: #666;
            margin-top: 3px;
        }

        .dropdown-item:hover .dropdown-class,
        .dropdown-item.selected .dropdown-class {
            color: inherit;
            opacity: 0.8;
        }

        .no-results {
            padding: 15px;
            text-align: center;
            color: #999;
            font-style: italic;
        }

        .form-group {
            position: relative;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 3px solid #e0e0e0;
            padding-bottom: 0;
        }

        .nav-tab {
            background: transparent;
            color: #666;
            padding: 12px 25px;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: -3px;
        }

        .nav-tab:hover {
            color: #667eea;
        }

        .nav-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 20px;
            }

            .member-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .violation-count {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🏕️ Sistem Pendataan Pelanggaran</h2>
            <h1>DEWAN AMBALAN PANDANARAN SRIKANDI</h1>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalViolations">0</div>
                <div class="stat-label">Total Pelanggaran</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Jumlah Anggota yang Melanggar</div>
            </div>
        </div>

        <div id="warningSection"></div>

        <div class="card">
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('pelanggaran')">📝 Catat Pelanggaran</button>
                <button class="nav-tab" onclick="switchTab('anggota')">👥 Manajemen Anggota</button>
                <button class="nav-tab" onclick="switchTab('daftar')">📋 Daftar Pelanggaran</button>
            </div>

            <!-- Tab Catat Pelanggaran -->
            <div id="tab-pelanggaran" class="tab-content active">
                <h2 style="margin-bottom: 20px; color: #333;">📝 Form Pendataan Pelanggaran</h2>
                <form id="violationForm">
                    <div class="form-group">
                        <label for="memberSearch">Pilih Anggota (Ketik untuk mencari)</label>
                        <input type="text" id="memberSearch" placeholder="Ketik nama anggota..." autocomplete="off" required>
                        <input type="hidden" id="selectedMember">
                        <div id="memberDropdown" class="member-dropdown"></div>
                    </div>

                    <div class="form-group">
                        <label for="tanggal">Tanggal Pelanggaran</label>
                        <input type="date" id="tanggal" required>
                    </div>

                    <div class="form-group">
                        <label for="deskripsi">Deskripsi Pelanggaran</label>
                        <textarea id="deskripsi" required placeholder="Jelaskan detail pelanggaran yang dilakukan"></textarea>
                    </div>

                    <button type="submit" class="btn">Tambah Data Pelanggaran</button>
                </form>
            </div>

            <!-- Tab Manajemen Anggota -->
            <div id="tab-anggota" class="tab-content">
                <h2 style="margin-bottom: 20px; color: #333;">👥 Manajemen Data Anggota</h2>
                <button class="btn" onclick="toggleMemberForm()" style="margin-bottom: 20px;">
                    ➕ Tambah Anggota Baru
                </button>
                
                <div id="memberForm" style="display: none;">
                    <h3 style="margin-bottom: 15px; color: #333;">Form Anggota Baru</h3>
                    <div class="form-group">
                        <label for="newMemberName">Nama Lengkap</label>
                        <input type="text" id="newMemberName" placeholder="Masukkan nama lengkap">
                    </div>
                    <div class="form-group">
                        <label for="newMemberClass">Kelas</label>
                        <input type="text" id="newMemberClass" placeholder="Contoh: XII IPA 1">
                    </div>
                    <button class="btn" onclick="addNewMember()">Simpan Anggota</button>
                </div>

                <div id="allMembersList"></div>
            </div>

            <!-- Tab Daftar Pelanggaran -->
            <div id="tab-daftar" class="tab-content">
                <h2 style="margin-bottom: 20px; color: #333;">📋 Daftar Anggota yang Melanggar</h2>
                <div id="membersList" class="members-list">
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p>Belum ada data pelanggaran</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let members = {};
        let allMembers = [];
        let currentTab = 'pelanggaran';

        function switchTab(tabName) {
            currentTab = tabName;
            
            // Update tab buttons
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function loadData() {
            const savedMembers = localStorage.getItem('members');
            const savedAllMembers = localStorage.getItem('allMembers');
            
            if (savedMembers) {
                members = JSON.parse(savedMembers);
            }
            
            if (savedAllMembers) {
                allMembers = JSON.parse(savedAllMembers);
            }
            
            renderMembers();
            updateStats();
            updateMemberSelect();
            renderAllMembers();
            setupMemberSearch();
        }

        function saveData() {
            localStorage.setItem('members', JSON.stringify(members));
            localStorage.setItem('allMembers', JSON.stringify(allMembers));
        }

        function toggleMemberForm() {
            const form = document.getElementById('memberForm');
            if (form.style.display === 'none') {
                form.style.display = 'block';
            } else {
                form.style.display = 'none';
            }
        }

        function addNewMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const className = document.getElementById('newMemberClass').value.trim();
            
            if (!name || !className) {
                alert('Mohon isi semua data anggota!');
                return;
            }
            
            const exists = allMembers.some(m => m.nama === name && m.kelas === className);
            if (exists) {
                alert('Anggota dengan nama dan kelas tersebut sudah ada!');
                return;
            }
            
            allMembers.push({
                nama: name,
                kelas: className
            });
            
            allMembers.sort((a, b) => a.nama.localeCompare(b.nama));
            
            saveData();
            updateMemberSelect();
            renderAllMembers();
            
            document.getElementById('newMemberName').value = '';
            document.getElementById('newMemberClass').value = '';
            toggleMemberForm();
            
            alert('Anggota baru berhasil ditambahkan!');
        }

        function deleteMemberFromList(index) {
            if (confirm('Yakin ingin menghapus anggota ini dari daftar?')) {
                const member = allMembers[index];
                const key = `${member.nama}|${member.kelas}`;
                
                allMembers.splice(index, 1);
                
                if (members[key]) {
                    delete members[key];
                }
                
                saveData();
                updateMemberSelect();
                renderAllMembers();
                renderMembers();
                updateStats();
            }
        }

        function updateMemberSelect() {
            // Tidak perlu lagi karena menggunakan search input
        }

        function setupMemberSearch() {
            const searchInput = document.getElementById('memberSearch');
            const dropdown = document.getElementById('memberDropdown');
            const hiddenInput = document.getElementById('selectedMember');
            let selectedIndex = -1;

            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                hiddenInput.value = '';
                
                if (searchTerm === '') {
                    dropdown.classList.remove('show');
                    dropdown.innerHTML = '';
                    return;
                }

                const filteredMembers = allMembers.filter(member => 
                    member.nama.toLowerCase().includes(searchTerm) ||
                    member.kelas.toLowerCase().includes(searchTerm)
                );

                if (filteredMembers.length === 0) {
                    dropdown.innerHTML = '<div class="no-results">Tidak ada anggota yang ditemukan</div>';
                    dropdown.classList.add('show');
                    return;
                }

                dropdown.innerHTML = filteredMembers.map((member, index) => `
                    <div class="dropdown-item" data-index="${index}" data-key="${member.nama}|${member.kelas}">
                        <div class="dropdown-name">${member.nama}</div>
                        <div class="dropdown-class">Kelas: ${member.kelas}</div>
                    </div>
                `).join('');

                dropdown.classList.add('show');
                selectedIndex = -1;

                const items = dropdown.querySelectorAll('.dropdown-item');
                items.forEach(item => {
                    item.addEventListener('click', function() {
                        const key = this.getAttribute('data-key');
                        const [nama, kelas] = key.split('|');
                        searchInput.value = `${nama} - ${kelas}`;
                        hiddenInput.value = key;
                        dropdown.classList.remove('show');
                        dropdown.innerHTML = '';
                    });
                });
            });

            searchInput.addEventListener('keydown', function(e) {
                const items = dropdown.querySelectorAll('.dropdown-item');
                
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                    updateSelection(items);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    selectedIndex = Math.max(selectedIndex - 1, -1);
                    updateSelection(items);
                } else if (e.key === 'Enter' && selectedIndex >= 0) {
                    e.preventDefault();
                    items[selectedIndex].click();
                } else if (e.key === 'Escape') {
                    dropdown.classList.remove('show');
                    dropdown.innerHTML = '';
                }
            });

            function updateSelection(items) {
                items.forEach((item, index) => {
                    if (index === selectedIndex) {
                        item.classList.add('selected');
                        item.scrollIntoView({ block: 'nearest' });
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }

            document.addEventListener('click', function(e) {
                if (!searchInput.contains(e.target) && !dropdown.contains(e.target)) {
                    dropdown.classList.remove('show');
                    dropdown.innerHTML = '';
                }
            });
        }

        function renderAllMembers() {
            const container = document.getElementById('allMembersList');
            
            if (allMembers.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>Belum ada anggota terdaftar. Tambahkan anggota baru!</p></div>';
                return;
            }
            
            container.innerHTML = `
                <h3 style="margin-bottom: 15px; color: #333;">Daftar Semua Anggota (${allMembers.length})</h3>
                ${allMembers.map((member, index) => `
                    <div class="member-card">
                        <div class="member-info">
                            <div class="member-info-name">${member.nama}</div>
                            <div class="member-info-class">Kelas: ${member.kelas}</div>
                        </div>
                        <button class="btn-small btn-delete" onclick="deleteMemberFromList(${index})">Hapus</button>
                    </div>
                `).join('')}
            `;
        }

        function updateStats() {
            const totalViolations = Object.values(members).reduce((sum, member) => sum + member.violations.length, 0);
            document.getElementById('totalViolations').textContent = totalViolations;
            document.getElementById('totalMembers').textContent = Object.keys(members).length;
            
            updateWarningSection();
        }

        function getWarningMembers() {
            return Object.values(members)
                .filter(member => member.violations.length >= 3)
                .sort((a, b) => b.violations.length - a.violations.length);
        }

        function updateWarningSection() {
            const warningMembers = getWarningMembers();
            const warningSection = document.getElementById('warningSection');
            
            if (warningMembers.length === 0) {
                warningSection.innerHTML = '';
                return;
            }

            warningSection.innerHTML = `
                <div class="warning-section">
                    <h3>
                        ⚠️ Peringatan: Anggota dengan 3+ Pelanggaran
                    </h3>
                    <div class="warning-list">
                        ${warningMembers.map(member => `
                            <div class="warning-item">
                                <div>
                                    <div class="warning-name">${member.nama}</div>
                                    <div class="warning-class">Kelas: ${member.kelas}</div>
                                </div>
                                <div class="warning-count-badge">${member.violations.length}x Pelanggaran</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderMembers() {
            const container = document.getElementById('membersList');
            
            if (Object.keys(members).length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        <p>Belum ada data pelanggaran</p>
                    </div>
                `;
                return;
            }

            const sortedMembers = Object.values(members).sort((a, b) => b.violations.length - a.violations.length);

            container.innerHTML = sortedMembers.map(member => {
                const isWarning = member.violations.length >= 3;
                const key = `${member.nama}|${member.kelas}`;
                
                return `
                <div class="member-item ${isWarning ? 'warning' : ''}">
                    <div class="member-header">
                        <div>
                            <div class="member-name">${member.nama}</div>
                            <span class="class-badge">Kelas: ${member.kelas}</span>
                        </div>
                        <div class="violation-count">
                            ${isWarning ? '<span class="warning-icon">⚠️</span>' : ''}
                            <span class="count-badge ${isWarning ? 'warning' : ''}">${member.violations.length}x Pelanggaran</span>
                        </div>
                    </div>
                    <button class="toggle-btn" onclick="toggleDetails('${key}')">
                        Lihat Detail Pelanggaran
                    </button>
                    <div id="details-${key}" class="violation-details hidden">
                        ${member.violations.map((v, idx) => `
                            <div class="violation-entry">
                                <div class="violation-date">📅 ${formatDate(v.tanggal)}</div>
                                <div class="violation-desc">${v.deskripsi}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="action-buttons">
                        <button class="btn-small btn-delete" onclick="deleteMember('${key}')">Hapus Anggota</button>
                    </div>
                </div>
            `}).join('');
        }

        function toggleDetails(key) {
            const details = document.getElementById(`details-${key}`);
            const btn = event.target;
            
            if (details.classList.contains('hidden')) {
                details.classList.remove('hidden');
                btn.textContent = 'Sembunyikan Detail';
            } else {
                details.classList.add('hidden');
                btn.textContent = 'Lihat Detail Pelanggaran';
            }
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        }

        function deleteMember(key) {
            if (confirm('Yakin ingin menghapus semua data pelanggaran anggota ini?')) {
                delete members[key];
                saveData();
                renderMembers();
                updateStats();
            }
        }

        document.getElementById('violationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const selectedMember = document.getElementById('selectedMember').value;
            const tanggal = document.getElementById('tanggal').value;
            const deskripsi = document.getElementById('deskripsi').value;

            if (!selectedMember) {
                alert('Silakan pilih anggota terlebih dahulu!');
                return;
            }

            const [nama, kelas] = selectedMember.split('|');
            const key = selectedMember;

            const newViolation = {
                tanggal: tanggal,
                deskripsi: deskripsi
            };

            if (!members[key]) {
                members[key] = {
                    nama: nama,
                    kelas: kelas,
                    violations: []
                };
            }

            members[key].violations.unshift(newViolation);

            saveData();
            renderMembers();
            updateStats();

            document.getElementById('memberSearch').value = '';
            document.getElementById('selectedMember').value = '';
            document.getElementById('tanggal').value = '';
            document.getElementById('deskripsi').value = '';
            
            alert('Data pelanggaran berhasil ditambahkan!');
        });

        loadData();
    </script>
</body>
</html>
